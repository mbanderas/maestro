<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" role="img" aria-labelledby="t d">
  <title id="t">What Maestro gives you — five capabilities</title>
  <desc id="d">A dark card listing the five core Maestro capabilities: Done means done (verified status tokens, no false all done), Stays in its lane (surgical scope, no drive-by refactors), Long runs that land (checkpoints, caps, honest exits), Multi-agent only when it pays (a counted decision gate), and Receipts (a reproducible in-repo A/B benchmark).</desc>
  <style>
    .bg   { fill: #0a0a0c; }
    .chip { fill: rgb(245 158 11 / 0.12); stroke: #f59e0b; stroke-width: 1.5; }
    .num  { font: 700 11px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f59e0b; }
    .lbl  { font: 600 13px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f0f0f4; }
    .sub  { font: 400 11px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #9e9eaa; }
    .cap  { font: 600 10px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #9e9eaa; letter-spacing: 1px; }
    .rail { stroke: #f59e0b; stroke-width: 1.5; fill: none; stroke-dasharray: 6 7; animation: dash 1.6s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -26; } }
    @media (prefers-reduced-motion: reduce) { .rail { animation: none; } }
  </style>

  <!-- card background -->
  <rect class="bg" width="860" height="220" rx="14"/>

  <!-- amber dash-flow rail on left edge -->
  <line class="rail" x1="20" y1="28" x2="20" y2="200"/>

  <!-- header label -->
  <text class="cap" x="42" y="24">WHAT YOU GET</text>

  <!-- row 1: Done means done — chip y 40 -->
  <rect class="chip" x="42" y="40" width="22" height="22" rx="5"/>
  <text class="num" x="53" y="56" text-anchor="middle">1</text>
  <text class="lbl" x="76" y="56">Done means done</text>
  <text class="sub" x="330" y="56">— verified status tokens, no false "all done"</text>

  <!-- row 2: Stays in its lane — chip y 74 -->
  <rect class="chip" x="42" y="74" width="22" height="22" rx="5"/>
  <text class="num" x="53" y="90" text-anchor="middle">2</text>
  <text class="lbl" x="76" y="90">Stays in its lane</text>
  <text class="sub" x="330" y="90">— surgical scope, no drive-by refactors</text>

  <!-- row 3: Long runs that land — chip y 108 -->
  <rect class="chip" x="42" y="108" width="22" height="22" rx="5"/>
  <text class="num" x="53" y="124" text-anchor="middle">3</text>
  <text class="lbl" x="76" y="124">Long runs that land</text>
  <text class="sub" x="330" y="124">— checkpoints, caps, honest exits</text>

  <!-- row 4: Multi-agent only when it pays — chip y 142 -->
  <rect class="chip" x="42" y="142" width="22" height="22" rx="5"/>
  <text class="num" x="53" y="158" text-anchor="middle">4</text>
  <text class="lbl" x="76" y="158">Multi-agent only when it pays</text>
  <text class="sub" x="330" y="158">— a counted decision gate</text>

  <!-- row 5: Receipts — chip y 176 -->
  <rect class="chip" x="42" y="176" width="22" height="22" rx="5"/>
  <text class="num" x="53" y="192" text-anchor="middle">5</text>
  <text class="lbl" x="76" y="192">Receipts</text>
  <text class="sub" x="330" y="192">— a reproducible in-repo A/B benchmark</text>
</svg>
