<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 474" role="img" aria-labelledby="t d">
  <title id="t">Maestro Frontier fusion presets</title>
  <desc id="d">A dark reference card listing the thirteen Maestro Frontier fusion presets: opus-duo, opus-gpt, chatgpt-duo (amber-highlighted as the Codex-only option), frontier-trio, the Fable 5 family (fable-duo, fable-gpt, fable-trio), the Sonnet 5 family (sonnet-duo, sonnet-gpt, sonnet-trio), frontier-quad, frontier-quint, and custom. The custom row includes optional GPT-5.6 Sol, Terra, and Luna models. Each row shows the preset name, panel composition, and judge plus synthesis model.</desc>
  <style>
    .bg    { fill: #0a0a0c; }
    .lbl   { font: 600 13px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f0f0f4; }
    .hdr   { font: 700 11px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #9e9eaa; letter-spacing: 1px; }
    .cell  { font: 400 12px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #9e9eaa; }
    .name  { font: 600 12px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f0f0f4; }
    .amber { fill: #f59e0b; }
    .amb-c { font: 600 12px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f59e0b; }
    .divider { stroke: #222228; stroke-width: 1; }
    .row-amb { fill: rgb(245 158 11 / 0.07); }
    /* dash-flow accent under header */
    .flow-line {
      stroke: #f59e0b;
      stroke-width: 1.5;
      stroke-dasharray: 8 10;
      stroke-dashoffset: 0;
      fill: none;
      animation: dash 1.6s linear infinite;
    }
    @keyframes dash { to { stroke-dashoffset: -36; } }
    @media (prefers-reduced-motion: reduce) { .flow-line { animation: none; } }
  </style>

  <!-- card background -->
  <rect class="bg" width="820" height="474" rx="14"/>

  <!-- header underline -->
  <line class="divider" x1="24" y1="38" x2="796" y2="38"/>
  <!-- vertical dividers -->
  <line class="divider" x1="210" y1="14" x2="210" y2="454"/>
  <line class="divider" x1="590" y1="14" x2="590" y2="454"/>
  <!-- bottom border -->
  <line class="divider" x1="24" y1="454" x2="796" y2="454"/>

  <!-- animated amber underline under header row -->
  <line class="flow-line" x1="24" y1="38" x2="796" y2="38"/>

  <!-- ── HEADER ROW ── -->
  <text class="hdr" x="36" y="28">PRESET</text>
  <text class="hdr" x="222" y="28">PANEL</text>
  <text class="hdr" x="602" y="28">JUDGE + SYNTH</text>

  <!-- ROW 1: opus-duo  band 38..70 -->
  <text class="name" x="36" y="54" dominant-baseline="middle">opus-duo</text>
  <text class="cell" x="222" y="54" dominant-baseline="middle">Opus 4.8 ×2</text>
  <text class="cell" x="602" y="54" dominant-baseline="middle">Opus 4.8</text>
  <line class="divider" x1="24" y1="70" x2="796" y2="70"/>

  <!-- ROW 2: opus-gpt  band 70..102 -->
  <text class="name" x="36" y="86" dominant-baseline="middle">opus-gpt</text>
  <text class="cell" x="222" y="86" dominant-baseline="middle">Opus 4.8 + GPT-5.5</text>
  <text class="cell" x="602" y="86" dominant-baseline="middle">Opus 4.8</text>
  <line class="divider" x1="24" y1="102" x2="796" y2="102"/>

  <!-- ROW 3: chatgpt-duo (amber highlight)  band 102..134 -->
  <rect class="row-amb" x="1" y="102" width="818" height="32"/>
  <text class="amb-c" x="36" y="118" dominant-baseline="middle">chatgpt-duo</text>
  <text class="amb-c" x="222" y="118" dominant-baseline="middle">GPT-5.5 ×2</text>
  <text class="amb-c" x="602" y="118" dominant-baseline="middle">GPT-5.5</text>
  <line class="divider" x1="24" y1="134" x2="796" y2="134"/>

  <!-- ROW 4: frontier-trio  band 134..166 -->
  <text class="name" x="36" y="150" dominant-baseline="middle">frontier-trio</text>
  <text class="cell" x="222" y="150" dominant-baseline="middle">Opus 4.8 + GPT-5.5 + Gemini</text>
  <text class="cell" x="602" y="150" dominant-baseline="middle">Opus 4.8</text>
  <line class="divider" x1="24" y1="166" x2="796" y2="166"/>

  <!-- ROW 5: fable-duo  band 166..198 -->
  <text class="name" x="36" y="182" dominant-baseline="middle">fable-duo</text>
  <text class="cell" x="222" y="182" dominant-baseline="middle">Fable 5 ×2</text>
  <text class="cell" x="602" y="182" dominant-baseline="middle">Fable 5</text>
  <line class="divider" x1="24" y1="198" x2="796" y2="198"/>

  <!-- ROW 6: fable-gpt  band 198..230 -->
  <text class="name" x="36" y="214" dominant-baseline="middle">fable-gpt</text>
  <text class="cell" x="222" y="214" dominant-baseline="middle">Fable 5 + GPT-5.5</text>
  <text class="cell" x="602" y="214" dominant-baseline="middle">Fable 5</text>
  <line class="divider" x1="24" y1="230" x2="796" y2="230"/>

  <!-- ROW 7: fable-trio  band 230..262 -->
  <text class="name" x="36" y="246" dominant-baseline="middle">fable-trio</text>
  <text class="cell" x="222" y="246" dominant-baseline="middle">Fable 5 + GPT-5.5 + Gemini</text>
  <text class="cell" x="602" y="246" dominant-baseline="middle">Fable 5</text>
  <line class="divider" x1="24" y1="262" x2="796" y2="262"/>

  <!-- ROW 8: sonnet-duo  band 262..294 -->
  <text class="name" x="36" y="278" dominant-baseline="middle">sonnet-duo</text>
  <text class="cell" x="222" y="278" dominant-baseline="middle">Sonnet 5 ×2</text>
  <text class="cell" x="602" y="278" dominant-baseline="middle">Sonnet 5</text>
  <line class="divider" x1="24" y1="294" x2="796" y2="294"/>

  <!-- ROW 9: sonnet-gpt  band 294..326 -->
  <text class="name" x="36" y="310" dominant-baseline="middle">sonnet-gpt</text>
  <text class="cell" x="222" y="310" dominant-baseline="middle">Sonnet 5 + GPT-5.5</text>
  <text class="cell" x="602" y="310" dominant-baseline="middle">Sonnet 5</text>
  <line class="divider" x1="24" y1="326" x2="796" y2="326"/>

  <!-- ROW 10: sonnet-trio  band 326..358 -->
  <text class="name" x="36" y="342" dominant-baseline="middle">sonnet-trio</text>
  <text class="cell" x="222" y="342" dominant-baseline="middle">Sonnet 5 + GPT-5.5 + Gemini</text>
  <text class="cell" x="602" y="342" dominant-baseline="middle">Sonnet 5</text>
  <line class="divider" x1="24" y1="358" x2="796" y2="358"/>

  <!-- ROW 11: frontier-quad  band 358..390 -->
  <text class="name" x="36" y="374" dominant-baseline="middle">frontier-quad</text>
  <text class="cell" x="222" y="374" dominant-baseline="middle">Fable 5 + Opus + GPT-5.5 + Gemini</text>
  <text class="cell" x="602" y="374" dominant-baseline="middle">Opus 4.8</text>
  <line class="divider" x1="24" y1="390" x2="796" y2="390"/>

  <!-- ROW 12: frontier-quint  band 390..422 -->
  <text class="name" x="36" y="406" dominant-baseline="middle">frontier-quint</text>
  <text class="cell" x="222" y="406" dominant-baseline="middle">+ Sonnet 5  (five-model panel)</text>
  <text class="cell" x="602" y="406" dominant-baseline="middle">Opus 4.8</text>
  <line class="divider" x1="24" y1="422" x2="796" y2="422"/>

  <!-- ROW 13: custom  band 422..454 -->
  <text class="name" x="36" y="438" dominant-baseline="middle">custom</text>
  <text class="cell" x="222" y="438" dominant-baseline="middle">1–8; GPT-5.6 Sol / Terra / Luna</text>
  <text class="cell" x="602" y="438" dominant-baseline="middle">any  (--judge / --synth)</text>
</svg>
