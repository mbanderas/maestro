<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" role="img" aria-labelledby="t d">
  <title id="t">Maestro orchestration flow</title>
  <desc id="d">A task passes the S1 decision gate, which emits a counted verdict line before any edit, routing to either a single agent under the universal rules or the multi-agent pipeline of planner, bounded specialist group, and staff engineer review, converging on verified delivery.</desc>
  <style>
    .node { fill: #121216; stroke: #222228; stroke-width: 1.5; }
    .gate { fill: rgb(245 158 11 / 0.08); stroke: #f59e0b; stroke-width: 2; }
    .chip { fill: rgb(158 158 170 / 0.14); stroke: #222228; }
    .lbl  { font: 600 14px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f0f0f4; }
    .sub  { font: 400 11px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #9e9eaa; }
    .edge { stroke: #44444e; stroke-width: 1.5; fill: none; }
    .flow { stroke-dasharray: 6 7; animation: dash 1.6s linear infinite; }
    .acc  { stroke: #f59e0b; }
    .acct { fill: #fbbf24; }
    @keyframes dash { to { stroke-dashoffset: -26; } }
    @media (prefers-reduced-motion: reduce) { .flow { animation: none; } }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#44444e"/>
    </marker>
  </defs>

  <rect width="980" height="400" rx="12" fill="#0a0a0c"/>

  <!-- task -->
  <rect class="node" x="28" y="176" width="116" height="48" rx="8"/>
  <text class="lbl" x="86" y="197" text-anchor="middle">task</text>
  <text class="sub" x="86" y="213" text-anchor="middle">any size</text>

  <!-- decision gate -->
  <path class="gate" d="M260 132 L332 200 L260 268 L188 200 Z"/>
  <text class="lbl acct" x="260" y="196" text-anchor="middle">gate S1</text>
  <text class="sub" x="260" y="212" text-anchor="middle">counted verdict</text>

  <path class="edge flow" d="M144 200 H180" marker-end="url(#a)"/>

  <!-- single-agent branch -->
  <path class="edge flow" d="M260 132 V96 H384" marker-end="url(#a)"/>
  <rect class="node" x="392" y="72" width="190" height="48" rx="8"/>
  <text class="lbl" x="487" y="93" text-anchor="middle">single agent</text>
  <text class="sub" x="487" y="109" text-anchor="middle">S7 universal rules</text>
  <path class="edge flow" d="M582 96 H846 V176" marker-end="url(#a)"/>

  <!-- multi-agent branch -->
  <path class="edge flow" d="M260 268 V312 H332" marker-end="url(#a)"/>
  <rect class="node" x="340" y="288" width="120" height="48" rx="8"/>
  <text class="lbl" x="400" y="309" text-anchor="middle">planner</text>
  <text class="sub" x="400" y="325" text-anchor="middle">S2</text>

  <path class="edge flow" d="M460 312 H496" marker-end="url(#a)"/>
  <rect class="node" x="504" y="278" width="166" height="68" rx="8"/>
  <rect class="chip" x="516" y="290" width="34" height="20" rx="4"/>
  <rect class="chip" x="554" y="290" width="34" height="20" rx="4"/>
  <rect class="chip" x="592" y="290" width="34" height="20" rx="4"/>
  <rect class="chip" x="630" y="290" width="28" height="20" rx="4"/>
  <text class="lbl" x="587" y="326" text-anchor="middle">specialists</text>
  <text class="sub" x="587" y="340" text-anchor="middle">S3 max 4 - cross-talk S4</text>

  <path class="edge flow" d="M670 312 H706" marker-end="url(#a)"/>
  <rect class="node" x="714" y="288" width="150" height="48" rx="8"/>
  <text class="lbl" x="789" y="309" text-anchor="middle">staff engineer</text>
  <text class="sub" x="789" y="325" text-anchor="middle">S5 adversarial review</text>

  <path class="edge flow" d="M864 312 H902 V232" marker-end="url(#a)"/>

  <!-- delivery -->
  <rect class="node acc" x="838" y="176" width="128" height="48" rx="8" stroke-width="2"/>
  <text class="lbl acct" x="902" y="197" text-anchor="middle">verified</text>
  <text class="sub" x="902" y="213" text-anchor="middle">delivery</text>

  <!-- gate captions -->
  <text class="sub" x="300" y="120" text-anchor="middle">&lt;=3 files, sequential</text>
  <text class="sub" x="304" y="286" text-anchor="middle">parallel / isolated / adversarial</text>
</svg>
