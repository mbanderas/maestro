# Publish: npm publish on a pushed v* tag.
# Tag the release commit (e.g. `git tag v1.4.6 && git push origin v1.4.6`).
# Requires repo secret NPM_TOKEN (npm Automation/granular publish token).
name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ${{ vars.HOME_CI == 'true' && fromJSON('["self-hosted", "windows", "x64", "home-ci"]') || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Tag matches package.json version
        run: node scripts/check-release-tag.cjs

      - name: Tests
        run: npm test

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
